<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signage Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #media-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .slide {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }

    .slide.active { opacity: 1; }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .slide video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #status-screen {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #status-screen img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #status-screen .text-fallback {
      color: #444;
      font-family: 'Segoe UI', sans-serif;
      font-size: 1.2rem;
      text-align: center;
    }

    #status-screen .text-fallback div {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

<div id="media-container"></div>

<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script>
  const screenId = new URLSearchParams(window.location.search).get('screen') || 'default';
  const socket = io('http://localhost:3000', { query: { screenId } });

  let playlist = [];
  let currentIndex = 0;
  let timer = null;
  let isActive = true;
  let settings = { defaultImageUrl: null, defaultImageType: null };

  async function init() {
    const [screensRes, settingsRes] = await Promise.all([
      fetch('http://localhost:3000/api/screens'),
      fetch('http://localhost:3000/api/settings')
    ]);
    const screens = await screensRes.json();
    const s = screens.find(sc => sc.id === screenId);
    settings = await settingsRes.json();

    isActive = s ? s.active !== false : true;

    if (!isActive) {
      showStatusScreen();
    }
  }

  socket.on('playlist-updated', (newPlaylist) => {
    playlist = newPlaylist;
    if (isActive) {
      clearTimeout(timer);
      currentIndex = 0;
      renderCurrent();
    }
  });

  socket.on('screen-toggled', ({ active, defaultImageUrl, defaultImageType }) => {
    isActive = active;
    settings.defaultImageUrl = defaultImageUrl;
    settings.defaultImageType = defaultImageType;
    clearTimeout(timer);
    if (isActive) {
      currentIndex = 0;
      renderCurrent();
    } else {
      showStatusScreen();
    }
  });

  socket.on('settings-updated', (newSettings) => {
    settings = newSettings;
  });

  function showStatusScreen() {
    const container = document.getElementById('media-container');
    if (settings.defaultImageUrl) {
      const isVideo = settings.defaultImageType === 'video';
      container.innerHTML = `
        <div id="status-screen" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;">
          ${isVideo
            ? `<video src="http://localhost:3000${settings.defaultImageUrl}" autoplay loop muted playsinline style="width:100%;height:100%;object-fit:contain;"></video>`
            : `<img src="http://localhost:3000${settings.defaultImageUrl}" style="width:100%;height:100%;object-fit:contain;" />`}
        </div>`;
    } else {
      container.innerHTML = `
        <div id="status-screen" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
          <div style="color:#444;font-family:Segoe UI,sans-serif;font-size:1.2rem;text-align:center;">
            <div style="font-size:3rem;margin-bottom:1rem;">📺</div>
            Waiting for content...
          </div>
        </div>`;
    }
  }

  function renderCurrent() {
    const container = document.getElementById('media-container');
    container.innerHTML = '';

    if (!playlist.length) {
      showStatusScreen();
      return;
    }

    const item = playlist[currentIndex];
    const slide = document.createElement('div');
    slide.className = 'slide';

    if (item.type === 'image') {
      const img = document.createElement('img');
      img.src = `http://localhost:3000${item.url}`;
      slide.appendChild(img);
      container.appendChild(slide);
      requestAnimationFrame(() => requestAnimationFrame(() => slide.classList.add('active')));
      timer = setTimeout(() => advanceSlide(), item.duration * 1000);

    } else if (item.type === 'video') {
      const video = document.createElement('video');
      video.src = `http://localhost:3000${item.url}`;
      video.autoplay = true;
      video.muted = true;
      video.playsInline = true;
      slide.appendChild(video);
      container.appendChild(slide);
      requestAnimationFrame(() => requestAnimationFrame(() => slide.classList.add('active')));
      video.onended = () => { clearTimeout(timer); advanceSlide(); };
      video.onerror = () => { timer = setTimeout(() => advanceSlide(), item.duration * 1000); };
    }
  }

  function advanceSlide() {
    clearTimeout(timer);
    currentIndex = (currentIndex + 1) % playlist.length;
    renderCurrent();
  }

  init();
</script>
</body>
</html>
